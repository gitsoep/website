<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ status_code }} - {{ title }}</title>
  <style nonce="{{ request.state.csp_nonce }}">
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      color: #e0e0e0;
    }

    .card {
      background: #2a2a2a;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 640px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
      text-align: center;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #3a3a3a;
      margin-bottom: 28px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }

    .error-code {
      font-size: 5rem;
      font-weight: 700;
      color: #aa5555;
      line-height: 1;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }

    .message {
      font-size: 1rem;
      color: #888888;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .home-link {
      display: inline-block;
      padding: 12px 28px;
      background: #333333;
      color: #ffffff;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 500;
      border: 1px solid #444444;
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .home-link:hover {
      background: #3a3a3a;
      border-color: #555555;
    }

    .footer {
      margin-top: 28px;
      font-size: 0.75rem;
      color: #555555;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="/images/soep.gif" alt="soep.org" class="avatar" id="avatar">
    <div class="error-code">{{ status_code }}</div>
    <h1>{{ title }}</h1>
    <p class="message">{{ message }}</p>
    <a href="/" class="home-link">Go Home</a>
    <div class="footer">Powered by soep.org</div>
  </div>

  <script nonce="{{ request.state.csp_nonce }}">
    document.getElementById('avatar').addEventListener('error', function() {
      this.style.display = 'none';
    });
  </script>
</body>
</html>
