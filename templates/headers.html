<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soep Headers</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      color: #e0e0e0;
    }

    .card {
      background: #2a2a2a;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: fit-content;
      min-width: 640px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
      text-align: center;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #3a3a3a;
      margin-bottom: 28px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 32px;
      letter-spacing: -0.02em;
    }

    .ip-section {
      background: #222222;
      border-radius: 14px;
      padding: 20px 24px;
      margin-bottom: 16px;
      border: 1px solid #333333;
      transition: border-color 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .ip-section:hover {
      border-color: #4a4a4a;
    }

    .ip-section:last-child {
      margin-bottom: 0;
    }

    .ip-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888888;
      white-space: nowrap;
      text-align: left;
    }

    .ip-value {
      font-size: 1.05rem;
      font-weight: 500;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      color: #ffffff;
      word-break: break-all;
      line-height: 1.5;
      text-align: right;
    }

    .footer {
      margin-top: 28px;
      font-size: 0.75rem;
      color: #555555;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="/images/soep.gif" alt="soep.org" class="avatar"
         onerror="this.style.display='none'">
    <h1>HTTP Headers</h1>

    {% for name, value in headers.items() %}
    <div class="ip-section">
      <div class="ip-label">{{ name }}</div>
      <div class="ip-value">{{ value }}</div>
    </div>
    {% endfor %}

    <div class="footer">Powered by soep.org</div>
  </div>
</body>
</html>
