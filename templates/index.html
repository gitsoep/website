<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soep's Website</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      color: #e0e0e0;
    }

    .card {
      background: #2a2a2a;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: fit-content;
      min-width: 200px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
      text-align: center;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #3a3a3a;
      margin-bottom: 28px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 32px;
      letter-spacing: -0.02em;
    }

    .ip-section {
      background: #222222;
      border-radius: 14px;
      padding: 20px 24px;
      margin-bottom: 16px;
      border: 1px solid #333333;
      transition: border-color 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      position: relative;
    }

    .ip-section:hover {
      border-color: #4a4a4a;
    }

    .ip-section:last-child {
      margin-bottom: 0;
    }

    .copy-btn {
      background: none;
      border: 1px solid #444;
      border-radius: 6px;
      color: #888;
      cursor: pointer;
      padding: 4px 10px;
      font-size: 0.7rem;
      font-family: inherit;
      line-height: 1.4;
      white-space: nowrap;
      flex-shrink: 0;
      transition: color 0.2s, border-color 0.2s;
    }

    .copy-btn:hover {
      color: #ccc;
      border-color: #666;
    }

    .copy-btn.copied {
      color: #6a6;
      border-color: #6a6;
    }

    .ip-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888888;
      white-space: nowrap;
      text-align: left;
    }

    .ip-value {
      font-size: 1.25rem;
      font-weight: 500;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      color: #ffffff;
      word-break: break-all;
      line-height: 1.5;
      text-align: right;
      flex: 1;
    }

    .ip-value.loading {
      color: #555555;
      font-style: italic;
      font-family: inherit;
      font-size: 0.95rem;
    }

    .ip-value.error {
      color: #aa5555;
      font-size: 0.9rem;
      font-family: inherit;
    }

    .footer {
      margin-top: 28px;
      font-size: 0.75rem;
      color: #555555;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="/images/soep.gif" alt="soep.org" class="avatar"
         onerror="this.style.display='none'">
    <h1>Your IP Address</h1>

    <div class="ip-section">
      <div class="ip-label">IPv4</div>
      <div class="ip-value loading" id="ipv4">Detecting&hellip;</div>
      <button class="copy-btn" onclick="copyIP('ipv4', this)">Copy</button>
    </div>

    <div class="ip-section">
      <div class="ip-label">IPv6</div>
      <div class="ip-value loading" id="ipv6">Detecting&hellip;</div>
      <button class="copy-btn" onclick="copyIP('ipv6', this)">Copy</button>
    </div>

    <div class="footer">Powered by soep.org</div>
  </div>

  <script>
    async function fetchIP(url, elementId) {
      const el = document.getElementById(elementId);
      try {
        const res = await fetch(url, { signal: AbortSignal.timeout(6000) });
        if (!res.ok) throw new Error('Request failed');
        const ip = (await res.text()).trim();
        el.textContent = ip;
        el.classList.remove('loading');
      } catch {
        el.textContent = 'Not available';
        el.classList.remove('loading');
        el.classList.add('error');
      }
    }

    function copyIP(id, btn) {
      const text = document.getElementById(id).textContent;
      if (!text || text === 'Detecting…' || text === 'Not available') return;
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      btn.classList.add('copied');
      btn.textContent = 'Copied!';
      setTimeout(() => { btn.classList.remove('copied'); btn.textContent = 'Copy'; }, 1500);
    }

    fetchIP('https://api4.ipify.org', 'ipv4');
    fetchIP('https://api6.ipify.org', 'ipv6');
  </script>
</body>
</html>
