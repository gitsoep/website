<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soep's Website</title>
  <style nonce="{{ request.state.csp_nonce }}">
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      color: #e0e0e0;
    }

    .card {
      background: #2a2a2a;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: fit-content;
      min-width: 200px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
      text-align: center;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #3a3a3a;
      margin-bottom: 28px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 32px;
      letter-spacing: -0.02em;
    }

    .ip-section {
      background: #222222;
      border-radius: 14px;
      padding: 20px 24px;
      margin-bottom: 16px;
      border: 1px solid #333333;
      transition: border-color 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      position: relative;
    }

    .ip-section:hover {
      border-color: #4a4a4a;
      cursor: pointer;
    }

    .ip-section.copied {
      border-color: #6a6;
    }

    .ip-section:last-child {
      margin-bottom: 0;
    }

    .ip-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888888;
      white-space: nowrap;
      text-align: left;
    }

    .ip-value {
      font-size: 1.25rem;
      font-weight: 500;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      color: #ffffff;
      word-break: break-all;
      line-height: 1.5;
      text-align: right;
      flex: 1;
    }

    .ip-value.loading {
      color: #555555;
      font-style: italic;
      font-family: inherit;
      font-size: 0.95rem;
    }

    .ip-value.error {
      color: #aa5555;
      font-size: 0.9rem;
      font-family: inherit;
    }

    .footer {
      margin-top: 28px;
      font-size: 0.75rem;
      color: #555555;
    }
  </style>
<!-- Matomo -->
<script>
  var _paq = window._paq = window._paq || [];
  /* tracker methods like "setCustomDimension" should be called before "trackPageView" */
  _paq.push(['trackPageView']);
  _paq.push(['enableLinkTracking']);
  (function() {
    var u="//matomo.soep.org/";
    _paq.push(['setTrackerUrl', u+'matomo.php']);
    _paq.push(['setSiteId', '1']);
    var d=document, g=d.createElement('script'), s=d.getElementsByTagName('script')[0];
    g.async=true; g.src=u+'matomo.js'; s.parentNode.insertBefore(g,s);
  })();
</script>
<!-- End Matomo Code -->
</head>
<body>
  <div class="card">
    <img src="/images/soep.gif" alt="soep.org" class="avatar" id="avatar">
    <h1>Your IP Address</h1>

    <div class="ip-section" data-target="ipv4">
      <div class="ip-label">IPv4</div>
      <div class="ip-value loading" id="ipv4">Detecting&hellip;</div>
    </div>

    <div class="ip-section" data-target="ipv6">
      <div class="ip-label">IPv6</div>
      <div class="ip-value loading" id="ipv6">Detecting&hellip;</div>
    </div>

    <div class="footer">Powered by soep.org</div>
  </div>

  <script nonce="{{ request.state.csp_nonce }}">
    async function fetchIP(url, elementId) {
      const el = document.getElementById(elementId);
      try {
        const res = await fetch(url, { signal: AbortSignal.timeout(6000) });
        if (!res.ok) throw new Error('Request failed');
        const ip = (await res.text()).trim();
        el.textContent = ip;
        el.classList.remove('loading');
      } catch {
        el.textContent = 'Not available';
        el.classList.remove('loading');
        el.classList.add('error');
      }
    }

    function copyIP(section) {
      const el = document.getElementById(section.dataset.target);
      const text = el.textContent;
      if (!text || text === 'Detecting…' || text === 'Not available') return;
      navigator.clipboard.writeText(text).then(() => {
        section.classList.add('copied');
        setTimeout(() => section.classList.remove('copied'), 1500);
      });
    }

    document.getElementById('avatar').addEventListener('error', function() {
      this.style.display = 'none';
    });

    document.querySelectorAll('.ip-section').forEach(section => {
      section.addEventListener('click', () => copyIP(section));
    });

    fetchIP('https://ipv4.soep.org/api/ip', 'ipv4');
    fetchIP('https://ipv6.soep.org/api/ip', 'ipv6');
  </script>
</body>
</html>
